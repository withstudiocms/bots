name: CI - Push to Main

on:
  push:
    branches: [ main ]

permissions:
  deployments: write
  contents: read
  packages: write

jobs:
  merge-bot:
    if: github.repository_owner == 'withstudiocms' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[ci] lint')
    uses: withstudiocms/automations/.github/workflows/mergebot.yml@f286863f2f7a414794b9a10ee6f1cadbb07f722f # main
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_MERGEBOT }}